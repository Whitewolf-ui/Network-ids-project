<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create your account — {{ company.name }}</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <a class="auth-brand" href="/">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2 L21 6 V12 C21 17 17 20.5 12 22 C7 20.5 3 17 3 12 V6 Z" stroke="#F6F8FB" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M8 12 L10.5 14.5 L16 9" stroke="#0EA5A0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span style="font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:16px;">{{ company.name }}</span>
    </a>
    <h1>Create your account</h1>
    <p class="sub">Set up your login to start monitoring your network.</p>

    {% if error %}
    <div class="form-alert error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/setup">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="whitewolf" required minlength="3" autocomplete="username">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="confirm_password">Confirm password</label>
        <input type="password" id="confirm_password" name="confirm_password" required minlength="8" autocomplete="new-password">
      </div>
      <button class="btn btn-primary btn-block" type="submit">Create account</button>
    </form>

    <p class="auth-foot">Already set up? <a href="/login">Log in</a></p>
  </div>
</div>
</body>
</html>
